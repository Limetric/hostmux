name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  claude-review:
    if: >
      (github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request with awareness of prior review rounds.

            Before leaving feedback:
            - Read the PR description and existing PR comments or review feedback.
            - Use the recent commit history and current diff to understand what changed since earlier review rounds.
            - Treat previously addressed comments as resolved unless the underlying issue is still present in the current code.

            Focus your review on:
            - Newly introduced bugs or regressions
            - Unresolved review feedback that still applies
            - Code quality and best practices
            - Performance considerations
            - Security concerns
            - Test coverage gaps

            Do not repeat comments that were already addressed in later commits unless the problem remains.

            Use AGENTS.md file for guidance on style and conventions.

            IMPORTANT: Be concise and avoid unnecessary verbosity. Focus on actionable feedback. Be constructive and helpful.

            Use `gh pr view`, `gh pr diff`, and other allowed `gh pr` commands as needed to inspect prior feedback before commenting.
            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
          
          claude_args: |
            --model claude-opus-4-6
            --mcp-config .mcp.json

          additional_permissions: |
            actions: read

      - name: Remove trigger:review label
        if: github.event.action == 'labeled'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label 'trigger:review' || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
