name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Run Go checks
        run: |
          go vet ./...
          go tool staticcheck ./...
          go test ./... -count=1
      - name: Verify Windows cross-compilation
        run: GOOS=windows GOARCH=amd64 go build ./...

  windows-checks:
    runs-on: windows-latest
    # Use bash on Windows so the gofmt snippet below works unchanged
    # (Git Bash ships on GitHub's windows-latest runners).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Run Go checks
        run: |
          go vet ./...
          go tool staticcheck ./...
          go test ./... -count=1
    # Integration tests stay Unix-only (see AGENTS.md); the default unit
    # suite above runs natively on Windows.

  build:
    if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    needs: [go-checks]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build -ldflags="-X main.buildVersion=dev -X main.buildCommit=${GITHUB_SHA}" -o hostmux .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: go-checks
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          # Artifact naming is deterministic: hostmux-<os>-<arch>[.exe].
          out="hostmux-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w -X main.buildVersion=${GITHUB_REF_NAME} -X main.buildCommit=${GITHUB_SHA}" -o "$out" .
          sha256sum "$out" > "$out.sha256"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - name: Upload release binary and checksum
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
