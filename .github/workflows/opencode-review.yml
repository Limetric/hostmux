name: OpenCode Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  opencode-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 20
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run OpenCode review
        uses: anomalyco/opencode/github@latest
        id: review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode-go/glm-5.1
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request with awareness of prior review rounds.

            Before leaving feedback:
            - Read the PR description and existing PR comments or review feedback.
            - Use recent commit history and the current diff to understand what changed since earlier review rounds.
            - Treat previously addressed comments as resolved unless the underlying issue is still present in the current code.

            Focus your review on:
            - Newly introduced bugs or regressions
            - Unresolved review feedback that still applies
            - Code quality and best practices
            - Performance considerations
            - Security concerns
            - Test coverage gaps

            Do not repeat comments that were already addressed in later commits unless the problem remains.

            IMPORTANT: Be concise and avoid unnecessary verbosity. Focus on actionable feedback. Be constructive and helpful.

            Use `gh pr view`, `gh pr diff`, and other read-only `gh pr` commands as needed to inspect prior feedback.

            Do not post to GitHub yourself (no `gh pr comment`, no review or issue APIs): this workflow publishes your final message as the PR comment. Put the full review in your last reply only.
